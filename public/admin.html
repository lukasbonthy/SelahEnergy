<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selah Energy Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-white">
  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h1 class="text-4xl font-black tracking-tight">Orders</h1>
        <p class="mt-2 text-white/50">Use /admin.html?pin=1234 then change the PIN in .env.</p>
      </div>
      <button id="refresh" class="rounded-2xl bg-white px-5 py-3 font-black text-black">Refresh</button>
    </div>

    <div id="orders" class="mt-8 grid gap-4"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const pin = params.get("pin") || prompt("Admin PIN");

    async function loadOrders() {
      const box = document.querySelector("#orders");
      box.innerHTML = "<p class='text-white/50'>Loading...</p>";

      const res = await fetch(`/api/admin/orders?pin=${encodeURIComponent(pin)}`);
      const data = await res.json();

      if (!res.ok) {
        box.innerHTML = `<p class="rounded-2xl bg-red-500/10 p-5 text-red-200">${data.error || "Error"}</p>`;
        return;
      }

      if (!data.orders.length) {
        box.innerHTML = "<p class='rounded-2xl bg-white/5 p-5 text-white/50'>No orders yet.</p>";
        return;
      }

      box.innerHTML = data.orders.map(order => `
        <article class="rounded-3xl border border-white/10 bg-white/[.06] p-5">
          <div class="flex flex-col justify-between gap-4 md:flex-row">
            <div>
              <div class="text-xs font-bold uppercase tracking-widest text-white/40">${new Date(order.created_at).toLocaleString()} • ${order.id}</div>
              <h2 class="mt-1 text-2xl font-black">${order.customer_name}</h2>
              <p class="mt-1 text-white/55">${order.email} • ${order.phone}</p>
              <p class="mt-1 text-white/55">${order.delivery_method}</p>
              ${order.address ? `<p class="mt-1 text-white/55">${order.address}, ${order.city}, ${order.state} ${order.zip}</p>` : ""}
            </div>
            <div class="text-left md:text-right">
              <div class="text-3xl font-black">${order.displayTotal}</div>
              <select data-id="${order.id}" class="mt-3 rounded-xl bg-black p-3 text-white">
                ${["new","confirmed","packed","delivered","cancelled"].map(s => `<option ${order.status === s ? "selected" : ""}>${s}</option>`).join("")}
              </select>
            </div>
          </div>

          <div class="mt-5 grid gap-2">
            ${order.items.map(item => `
              <div class="rounded-2xl bg-black/25 p-3 text-sm text-white/65">
                <strong class="text-white">${item.qty}x</strong> ${item.packLabel} ${item.productName} — ${(item.lineTotal / 100).toLocaleString("en-US", { style: "currency", currency: "USD" })}
              </div>
            `).join("")}
          </div>

          ${order.notes ? `<p class="mt-4 rounded-2xl bg-white/5 p-3 text-white/60">${order.notes}</p>` : ""}
        </article>
      `).join("");

      document.querySelectorAll("select[data-id]").forEach(select => {
        select.addEventListener("change", async () => {
          await fetch(`/api/admin/orders/${select.dataset.id}?pin=${encodeURIComponent(pin)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: select.value })
          });
        });
      });
    }

    document.querySelector("#refresh").addEventListener("click", loadOrders);
    loadOrders();
  </script>
</body>
</html>
